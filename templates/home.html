<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>
</head>
<body>
    <h1>FWI Prediction</h1>
    <form action="{{url_for('predict_data')}}" method="post">
        <input type="text" name="Temperature" required placeholder="Temperature"><br>
        <input type="text" name="RH" required placeholder="RH"><br>
        <input type="text" name="Ws" required placeholder="Ws"><br>
        <input type="text" name="Rain" required placeholder="Rain"><br>
        <input type="text" name="FFMC" required placeholder="FFMC"><br>
        <input type="text" name="DMC" required placeholder="DMC"><br>
        <input type="text" name="ISI" required placeholder="ISI"><br>
        <input type="text" name="Classes" required placeholder="Classes"><br>
        <input type="text" name="Region" required placeholder="Region"><br>

        <button type="submit" class="btn btn-primary btn-block btn-large" >Predict</button>
    </form>
    The FWI Prediction is {{result}}
</body>
</html>
